<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090b10"><meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="稳稳开拍"><link rel="manifest" href="manifest.webmanifest">
  <title>稳稳开拍｜iPhone 13 运动拍摄助手</title>
  <style>
  :root{color-scheme:dark;--red:#ff3b30;--line:#282c35}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#090b10;color:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}body{background:radial-gradient(circle at 80% -5%,#3b1820 0,transparent 34rem),#090b10}main{width:min(100%,540px);min-height:100svh;margin:auto;padding:max(28px,env(safe-area-inset-top)) 20px max(30px,env(safe-area-inset-bottom))}header{padding:12px 2px 22px}.eyebrow{font-size:13px;font-weight:700;letter-spacing:.08em;color:#ff9b94;display:flex;align-items:center;gap:8px}.dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 5px #ff3b3020}h1{font-size:46px;letter-spacing:-.055em;line-height:1;margin:20px 0 10px}header p{color:#9ea3ae;margin:0;font-size:16px}.preset{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:18px;background:#13161d;overflow:hidden;margin-bottom:18px}.preset div{text-align:center;padding:14px 4px;border-right:1px solid var(--line)}.preset div:last-child{border:0}.preset small{display:block;color:#7f8590;font-size:11px;margin-bottom:5px}.preset strong{font-size:20px}.preset span{font-size:10px;margin-left:2px;color:#9ea3ae}.card{border:1px solid var(--line);background:#13161d;border-radius:22px;overflow:hidden}.card-title{display:flex;justify-content:space-between;align-items:center;padding:20px 18px 10px}.card-title h2{font-size:18px;margin:0}.card-title span{font-size:13px;color:#8c929d;background:#20242c;padding:4px 9px;border-radius:99px}.check{width:100%;border:0;border-top:1px solid #22262e;color:inherit;background:transparent;display:flex;gap:14px;text-align:left;padding:15px 18px;align-items:center}.box{flex:0 0 27px;height:27px;border:2px solid #515762;border-radius:50%;display:grid;place-items:center;font-weight:800}.check b{display:block;font-size:15px}.check small{display:block;color:#7f8590;margin-top:4px;font-size:12px;line-height:1.35}.check.checked .box{background:#34c759;border-color:#34c759;color:#07140a}.check.checked b{color:#a5abb5;text-decoration:line-through}.tip{display:flex;flex-direction:column;gap:5px;margin:16px 2px 20px;padding:14px 16px;border-left:3px solid #ffb340;background:#17181c;border-radius:3px 12px 12px 3px}.tip b{font-size:13px;color:#ffca78}.tip span{font-size:14px;color:#c7c9ce}.shoot{width:100%;height:68px;border:0;border-radius:20px;background:#262a32;color:#767c87;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:12px}.shoot.ready{background:var(--red);color:white;box-shadow:0 12px 34px #ff3b3038}.shoot:active{transform:scale(.98)}.record{width:22px;height:22px;background:currentColor;border:5px solid #ffffff33;border-radius:50%;background-clip:padding-box}.camera{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}.reset{display:block;margin:16px auto 0;border:0;background:transparent;color:#848a95;padding:8px}.foot{text-align:center;font-size:11px;line-height:1.5;color:#606671;margin:8px 18px}.countdown{position:fixed;inset:0;z-index:5;background:#090b10f2;display:none;place-content:center;text-align:center}.countdown.show{display:grid}.countdown div{font-size:180px;font-weight:900;line-height:.9;color:var(--red)}.countdown span{font-size:18px;letter-spacing:.2em;margin-top:24px;color:#b4b7bd}@media(max-width:360px){main{padding-left:14px;padding-right:14px}h1{font-size:40px}}
  </style>
</head>
<body><main>
  <header><div class="eyebrow"><span class="dot"></span>iPhone 13 运动拍摄</div><h1>稳稳开拍</h1><p>开机前 10 秒检查，减少抖动、虚焦和废片。</p></header>
  <section class="preset"><div><small>画质</small><strong>4K</strong></div><div><small>帧率</small><strong>60</strong><span>fps</span></div><div><small>镜头</small><strong>1×</strong></div><div><small>方向</small><strong>横屏</strong></div></section>
  <section class="card" id="list"><div class="card-title"><h2>开拍检查</h2><span id="progress">0/4</span></div>
    <button class="check" data-id="lens"><span class="box"></span><span><b>镜头已擦干净</b><small>避免逆光雾化和污点</small></span></button>
    <button class="check" data-id="mode"><span class="box"></span><span><b>已设为 4K · 60 fps</b><small>暗光环境建议改用 4K · 30 fps</small></span></button>
    <button class="check" data-id="camera"><span class="box"></span><span><b>使用后置 1× 主摄</b><small>iPhone 13 主摄防抖效果最好</small></span></button>
    <button class="check" data-id="power"><span class="box"></span><span><b>电量与空间充足</b><small>建议剩余电量 30% 以上、空间 10GB 以上</small></span></button>
  </section>
  <div class="tip"><b>稳拍口诀</b><span>双手握持 · 手肘夹紧 · 屈膝小步走</span></div>
  <button class="shoot" id="shoot"><span class="record"></span><span>完成检查后开拍</span></button>
  <input class="camera" id="camera" type="file" accept="video/*" capture="environment">
  <button class="reset" id="reset">重新检查</button><p class="foot">首次使用请允许访问相机。实际分辨率由 iPhone“设置 → 相机 → 录制视频”决定。</p>
  <div class="countdown" id="countdown"><div>3</div><span>保持稳定</span></div>
</main><script>
const ids=['lens','mode','camera','power'],state=JSON.parse(localStorage.getItem('shoot-checks')||'{}');
const update=()=>{let n=0;document.querySelectorAll('.check').forEach(b=>{let on=!!state[b.dataset.id];b.classList.toggle('checked',on);b.querySelector('.box').textContent=on?'✓':'';if(on)n++});progress.textContent=n+'/4';shoot.classList.toggle('ready',n===4);shoot.lastElementChild.textContent=n===4?'3 秒倒计时开拍':'完成检查后开拍'};
document.querySelectorAll('.check').forEach(b=>b.onclick=()=>{state[b.dataset.id]=!state[b.dataset.id];localStorage.setItem('shoot-checks',JSON.stringify(state));navigator.vibrate?.(25);update()});
reset.onclick=()=>{ids.forEach(i=>delete state[i]);localStorage.removeItem('shoot-checks');update()};
shoot.onclick=()=>{if(!ids.every(i=>state[i])){list.scrollIntoView({behavior:'smooth'});navigator.vibrate?.([60,50,60]);return}let n=3;countdown.classList.add('show');countdown.firstElementChild.textContent=n;let t=setInterval(()=>{n--;if(!n){clearInterval(t);countdown.classList.remove('show');navigator.vibrate?.(100);camera.click()}else countdown.firstElementChild.textContent=n},700)};update();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
</script></body></html>
